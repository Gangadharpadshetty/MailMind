version: "3.9"

services:
  mailmind:
    build: .
    container_name: mailmind
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data          # persists chunks.json + LanceDB
      - ./runs:/app/runs          # persists trace.jsonl logs
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - DEFAULT_PROVIDER=${DEFAULT_PROVIDER:-gemini}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-2.0-flash}
      - DEBUG=${DEBUG:-false}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/ingest/status"]
      interval: 30s
      timeout: 5s
      retries: 3

  # Optional: run ingest as a one-shot job before starting the API
  ingest:
    build: .
    container_name: mailmind_ingest
    volumes:
      - ./data:/app/data
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    command: python ingest.py --csv /app/data/emails.csv
    profiles:
      - ingest   # only runs with: docker compose --profile ingest up ingest
